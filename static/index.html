<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nufi N-gram Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, Segoe UI, Arial, sans-serif;
      }

      body {
        margin: 0;
        padding: 16px;
        background: #f5f5f2;
        color: #161616;
      }

      main.panel {
        max-width: 960px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #d8d8d2;
        border-radius: 10px;
        padding: 16px 18px;
      }

      label[for="seed"] {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      textarea,
      input,
      button {
        font: inherit;
      }

      #seed {
        width: 100%;
        box-sizing: border-box;
        min-height: 100px;
        resize: vertical;
        border: 1px solid #b9b9b0;
        border-radius: 8px;
        padding: 10px 12px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-top: 12px;
      }

      button {
        border: 1px solid #0f5d44;
        border-radius: 8px;
        padding: 10px 16px;
        background: #0f8a63;
        color: #fff;
        cursor: pointer;
      }

      button.secondary {
        border-color: #90908a;
        background: #fff;
        color: #161616;
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      .predictions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        padding: 0;
        margin: 16px 0 0;
        list-style: none;
        min-height: 40px;
      }

      .predictions li {
        margin: 0;
      }

      button.suggestion {
        border: 1px solid #c4c4bc;
        border-radius: 999px;
        padding: 8px 14px;
        background: #f7f7f4;
        color: #161616;
        white-space: nowrap;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      button.suggestion:hover {
        background: #eef7f2;
        border-color: #0f8a63;
      }

      .empty {
        color: #888880;
        font-size: 14px;
        padding: 4px 0;
      }

      .error-text {
        color: #9f1c22;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <label for="seed">Seed text</label>
      <textarea id="seed" spellcheck="false" aria-label="Seed text"></textarea>

      <!-- Defaults for API (no visible settings UI) -->
      <input type="hidden" id="n" value="4" />
      <input type="hidden" id="numCandidates" value="5" />
      <input type="hidden" id="maxTokens" value="40" />
      <input type="hidden" id="temperature" value="1.0" />
      <input type="hidden" id="matchLimit" value="8" />

      <div class="toolbar">
        <button id="go" type="button">Generate</button>
        <button id="suggest" class="secondary" type="button">Refresh suggestions</button>
      </div>

      <ul
        id="suggestions"
        class="predictions"
        aria-live="polite"
        aria-label="Next-word predictions"
      ></ul>
    </main>

    <script>
      const DEFAULT_SEED = "ng\u0251\u030c y\u00fa'";
      const keyboardSuggestCache = new Map();

      const seedEl = document.getElementById("seed");
      const nEl = document.getElementById("n");
      const numCandidatesEl = document.getElementById("numCandidates");
      const maxTokensEl = document.getElementById("maxTokens");
      const temperatureEl = document.getElementById("temperature");
      const matchLimitEl = document.getElementById("matchLimit");
      const goEl = document.getElementById("go");
      const suggestEl = document.getElementById("suggest");
      const suggestionsEl = document.getElementById("suggestions");

      seedEl.value = DEFAULT_SEED;

      function readGenerateSettings() {
        return {
          text: seedEl.value,
          n: parseInt(nEl.value || "4", 10),
          num_candidates: parseInt(numCandidatesEl.value || "5", 10),
          max_tokens: parseInt(maxTokensEl.value || "40", 10),
          temperature: parseFloat(temperatureEl.value || "1"),
          match_limit: parseInt(matchLimitEl.value || "8", 10),
          max_sources_per_match: 3
        };
      }

      function readKeyboardSuggestSettings() {
        return {
          text: seedEl.value,
          n: parseInt(nEl.value || "4", 10),
          limit: 8
        };
      }

      function appendSuggestion(word) {
        const current = seedEl.value.trim();
        seedEl.value = current ? `${current} ${word}` : word;
      }

      function renderSuggestions(payload, errorMessage) {
        suggestionsEl.innerHTML = "";
        if (errorMessage) {
          const li = document.createElement("li");
          li.className = "error-text";
          li.textContent = errorMessage;
          suggestionsEl.appendChild(li);
          return;
        }

        if (!payload.suggestions || !payload.suggestions.length) {
          const li = document.createElement("li");
          li.className = "empty";
          li.textContent = "No suggestions for this seed.";
          suggestionsEl.appendChild(li);
          return;
        }

        payload.suggestions.forEach((suggestion) => {
          const li = document.createElement("li");
          const button = document.createElement("button");
          button.type = "button";
          button.className = "suggestion";
          const p = suggestion.score ?? suggestion.probability ?? 0;
          const word = suggestion.word;
          button.textContent = word;
          button.title = typeof p === "number" ? `p ≈ ${p.toFixed(4)}` : "";
          button.addEventListener("click", async () => {
            appendSuggestion(word);
            await fetchKeyboardSuggestions();
          });
          li.appendChild(button);
          suggestionsEl.appendChild(li);
        });
      }

      async function fetchKeyboardSuggestions() {
        const payload = readKeyboardSuggestSettings();
        const cacheKey = JSON.stringify(payload);
        if (keyboardSuggestCache.has(cacheKey)) {
          renderSuggestions(keyboardSuggestCache.get(cacheKey), null);
          return;
        }

        suggestEl.disabled = true;
        try {
          const resp = await fetch("/api/keyboard/suggest", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const data = await resp.json();
          if (!resp.ok) {
            throw new Error(data.detail || "Suggestion request failed");
          }
          keyboardSuggestCache.set(cacheKey, data);
          if (keyboardSuggestCache.size > 50) {
            const oldestKey = keyboardSuggestCache.keys().next().value;
            keyboardSuggestCache.delete(oldestKey);
          }
          renderSuggestions(data, null);
        } catch (error) {
          renderSuggestions({ suggestions: [], used_context: 0 }, error.message);
        } finally {
          suggestEl.disabled = false;
        }
      }

      async function generate() {
        const payload = readGenerateSettings();
        goEl.disabled = true;
        try {
          const resp = await fetch("/api/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });
          const data = await resp.json();
          if (!resp.ok) {
            throw new Error(data.detail || "Request failed");
          }
          keyboardSuggestCache.clear();
          await fetchKeyboardSuggestions();
        } catch (error) {
          renderSuggestions({ suggestions: [], used_context: 0 }, error.message);
        } finally {
          goEl.disabled = false;
        }
      }

      goEl.addEventListener("click", generate);
      suggestEl.addEventListener("click", fetchKeyboardSuggestions);
      seedEl.addEventListener("input", () => {
        keyboardSuggestCache.clear();
        window.clearTimeout(window.__suggestTimer);
        window.__suggestTimer = window.setTimeout(fetchKeyboardSuggestions, 250);
      });

      renderSuggestions({ suggestions: [], used_context: 0 }, null);
      fetchKeyboardSuggestions();
    </script>
  </body>
</html>
