<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nufi N-gram Demo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, Segoe UI, Arial, sans-serif;
      }

      body {
        margin: 0;
        padding: 16px;
        background: #f5f5f2;
        color: #161616;
      }

      main.panel {
        max-width: 960px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #d8d8d2;
        border-radius: 10px;
        padding: 16px 18px;
      }

      label[for="seed"] {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
      }

      textarea,
      input,
      button {
        font: inherit;
      }

      #seed {
        width: 100%;
        box-sizing: border-box;
        min-height: 100px;
        resize: vertical;
        border: 1px solid #b9b9b0;
        border-radius: 8px;
        padding: 10px 12px;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        margin-top: 12px;
      }

      button {
        border: 1px solid #0f5d44;
        border-radius: 8px;
        padding: 10px 16px;
        background: #0f8a63;
        color: #fff;
        cursor: pointer;
      }

      button.secondary {
        border-color: #90908a;
        background: #fff;
        color: #161616;
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      .predictions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        padding: 0;
        margin: 16px 0 0;
        list-style: none;
        min-height: 40px;
      }

      .predictions li {
        margin: 0;
      }

      button.suggestion {
        border: 1px solid #c4c4bc;
        border-radius: 999px;
        padding: 8px 14px;
        background: #f7f7f4;
        color: #161616;
        white-space: nowrap;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      button.suggestion:hover {
        background: #eef7f2;
        border-color: #0f8a63;
      }

      .empty {
        color: #888880;
        font-size: 14px;
        padding: 4px 0;
      }

      .error-text {
        color: #9f1c22;
        font-size: 14px;
      }

      .clafrica-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        font-size: 14px;
      }

      .clafrica-row input[type="checkbox"] {
        width: 1.1rem;
        height: 1.1rem;
        accent-color: #0f8a63;
        cursor: pointer;
      }

      .clafrica-row label {
        cursor: pointer;
        user-select: none;
      }

      .clafrica-hint {
        margin: 6px 0 0;
        font-size: 12px;
        color: #5a5a52;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <label for="seed">Seed text</label>
      <textarea id="seed" spellcheck="false" aria-label="Seed text"></textarea>

      <div class="clafrica-row">
        <input type="checkbox" id="clafrica" checked />
        <label for="clafrica">Clafrica shortcuts</label>
      </div>
      <p class="clafrica-hint" id="clafrica-hint" hidden>
        Type Latin shortcuts (e.g. <code>af</code>, <code>eu</code>); text is mapped to Nufi characters as you type.
        Turning this on also finalizes any unfinished shortcuts in the box.
      </p>

      <!-- Defaults for API (no visible settings UI) -->
      <input type="hidden" id="n" value="4" />
      <input type="hidden" id="numCandidates" value="5" />
      <input type="hidden" id="maxTokens" value="40" />
      <input type="hidden" id="temperature" value="1.0" />
      <input type="hidden" id="matchLimit" value="8" />

      <div class="toolbar">
        <button id="go" type="button">Generate</button>
        <button id="suggest" class="secondary" type="button">Refresh suggestions</button>
      </div>

      <ul
        id="suggestions"
        class="predictions"
        aria-live="polite"
        aria-label="Next-word predictions"
      ></ul>
    </main>

    <script type="module" src="/static/seed-demo.js"></script>
  </body>
</html>
